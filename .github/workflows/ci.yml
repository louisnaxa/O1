name: CI

on:
  push:
    branches: [main]
  pull_request:

# Permissions minimales — lecture seule sur le repo courant.
# Les appels vers encode/httpx (repo public) ne nécessitent aucun scope spécial.
permissions:
  contents: read

jobs:
  # ── Job 1 : tests unitaires — aucun accès réseau, aucun secret ───────────────
  unit-tests:
    name: Tests unitaires (mockés)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Installer les dépendances
        run: pip install -e ".[dev]"

      - name: Tests unitaires (exclut integration)
        run: pytest tests/ -m "not integration" -v

  # ── Job 2 : tests d'intégration — appels réels à l'API GitHub ───────────────
  # Prouve le CONTRAT avec GitHub : auth, URLs, noms de champs, valeurs réelles
  # sur des commits figés à résultat connu (GREEN et RED).
  # GITHUB_TOKEN est fourni automatiquement par Actions — aucun secret à configurer.
  # Ce job s'exécute seulement si les tests unitaires passent.
  integration-tests:
    name: Tests d'intégration (API GitHub réelle)
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Installer les dépendances
        run: pip install -e ".[dev]"

      - name: Tests d'intégration (API GitHub réelle)
        run: pytest tests/test_verif_ci_integration.py -m integration -v
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Optionnel : cibler un commit P1 connu
          # GITHUB_TEST_REPO: owner/p1
          # GITHUB_TEST_SHA: <sha>
          # GITHUB_TEST_EXPECTED: success

  # ── Job 3 : E2E — tuyau complet agent↔superviseur ────────────────────────────
  # Prouve le transport sans copier-coller : claude CLI → superviseur Anthropic.
  # Nécessite : secret ANTHROPIC_API_KEY configuré dans le dépôt GitHub.
  # Ce job s'exécute seulement si les tests unitaires passent.
  e2e-tests:
    name: Tests E2E (tuyau agent↔superviseur)
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Installer le CLI claude
        run: npm install -g @anthropic-ai/claude-code

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Installer les dépendances
        run: pip install -e ".[dev]"

      - name: Tests E2E (tuyau complet)
        run: pytest tests/test_pipe_e2e.py -m e2e -v
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
